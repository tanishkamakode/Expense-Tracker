<div class="dashboard-layout animate-pure-fade-in">
  <!-- Shared Backgrounds -->
  <div class="starfield-bg"
    style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; pointer-events: none;">
    <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
      <circle cx="20%" cy="30%" r="400" fill="rgba(168, 85, 247, 0.05)" filter="blur(80px)" />
      <circle cx="80%" cy="70%" r="400" fill="rgba(59, 130, 246, 0.05)" filter="blur(80px)" />
    </svg>
  </div>

  <header class="topbar" style="padding: 1.5rem 0;">
    <div class="container flex justify-between items-center">
      <h1 class="logo-text">AI Insights</h1>
      <button class="btn btn-secondary" routerLink="/dashboard">← Back to Dashboard</button>
    </div>
  </header>

  <main class="container py-8">

    <!-- Loading State -->
    <div *ngIf="loading" class="text-center py-10">
      <div
        class="spinner inline-block w-8 h-8 border-4 border-primary rounded-full border-t-transparent animate-spin mb-4"
        style="border-top-color: transparent; border-right-color: #8b5cf6; border-bottom-color: #8b5cf6; border-left-color: #8b5cf6;">
      </div>
      <p class="text-gray-400">Nebula AI is analyzing your universe...</p>
    </div>

    <!-- Error State -->
    <div *ngIf="error && !loading" class="card text-center py-10 border-red-500 border border-solid">
      <p class="text-red-400 m-0">{{ error }}</p>
      <button class="btn btn-primary mt-4" (click)="fetchAnalysis()">Retry</button>
    </div>

    <!-- Empty State -->
    <div *ngIf="!loading && !error && comparisons.length === 0" class="card text-center py-10 text-slate-400">
      <p>No data available for AI analysis this month.</p>
    </div>

    <div class="content-grid" *ngIf="!loading && !error && comparisons.length > 0">

      <!-- Section 2: AI Explanation + Suggestions -->
      <div class="card mt-8" style="grid-column: 1 / -1; margin-top: 2rem; padding-bottom: 2rem;">
        <h3 class="mb-4" style="color: var(--primary-color);">Nebula AI Financial Advice</h3>

        <div class="text-slate-300 leading-relaxed mb-6" style="color: #cbd5e1;" [innerHTML]="cleanExplanation">
        </div>

        <div *ngIf="suggestions.length > 0" class="p-8 rounded-lg border border-solid mt-4"
          style="background-color: rgba(15, 23, 42, 0.5); border-color: #334155; padding: 2rem;">
          <h4 class="text-lg font-semibold mb-3 flex items-center gap-2 m-0 mt-2 mb-4">
            <span style="color: #60a5fa;">💡</span> Actionable Suggestions
          </h4>
          <ul class="space-y-2 list-none p-0 m-0 text-left">
            <li *ngFor="let suggestion of suggestions" class="flex gap-3 mb-2" style="color: #cbd5e1;">
              <span style="color: #3b82f6;">•</span>
              <span [innerHTML]="suggestion"></span>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </main>
</div>
