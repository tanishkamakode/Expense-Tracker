<div class="login-container flex animate-pure-fade-in">
  <div class="login-card card">
    <div class="text-center mb-4">
      <h1 class="logo-text">ExpenseTracker</h1>
      <p class="subtitle">{{ isLoginMode() ? 'Welcome back! Please login.' : 'Create your account to start tracking.' }}</p>
    </div>

    <form [formGroup]="authForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
      <div *ngIf="!isLoginMode()" class="form-group">
        <label>Name</label>
        <input type="text" formControlName="name" placeholder="John Doe" />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="john@example.com" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="••••••••" />
      </div>

      <div *ngIf="loginError()" class="alert text-danger">
        Invalid credentials or something went wrong.
      </div>

      <button type="submit" class="btn btn-primary mt-4" [disabled]="authForm.invalid">
        {{ isLoginMode() ? 'Login' : 'Sign Up' }}
      </button>
    </form>

    <div class="text-center mt-4 border-top">
      <p class="toggle-text">
        {{ isLoginMode() ? "Don't have an account?" : 'Already have an account?' }}
        <a href="javascript:void(0)" (click)="toggleMode()">
          {{ isLoginMode() ? 'Sign up here' : 'Login here' }}
        </a>
      </p>
    </div>
  </div>
</div>
